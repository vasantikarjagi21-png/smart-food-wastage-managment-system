{% extends 'base.html' %}
{% block content %}

<h3>Meal Booking</h3>

<div class="card p-4 shadow bg-white col-md-6">
<form method="POST">
{% csrf_token %}

<label>Date</label>
<input type="date" name="date" class="form-control mb-3">

<label>Meal Type</label>
<select name="meal_type" class="form-control mb-3">
<option>Breakfast</option>
<option>Lunch</option>
<option>Dinner</option>
</select>

<button class="btn btn-success w-100">Book Meal</button>

</form>
</div>

{% endblock %}
